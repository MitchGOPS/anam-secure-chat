<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat with Cara</title>
</head>

<body style="text-align:center; font-family: Arial; padding: 40px;">

  <h1>Chat with Cara</h1>

  <video
    id="persona-video"
    autoplay
    playsinline
    style="max-width: 100%; border-radius: 10px;"
  ></video>

  <div id="status" style="margin-top: 20px; color: gray;">
    Loading...
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@anam-ai/js-sdk@latest";

    const statusElement = document.getElementById("status");

    async function createSessionToken() {
      const response = await fetch("/api/session-token", {
        method: "POST",
      });

      const data = await response.json();
      return data.sessionToken;
    }

    async function startChat() {
      try {
        statusElement.textContent = "Creating session...";

        const sessionToken = await createSessionToken();

        statusElement.textContent = "Connecting...";

        const anamClient = createClient(sessionToken);

        await anamClient.streamToVideoElement("persona-video");

        statusElement.textContent = "Connected! Start speaking.";
      } catch (error) {
        console.error(error);
        statusElement.textContent = "Failed to connect.";
      }
    }

    startChat();
  </script>

</body>
</html>
